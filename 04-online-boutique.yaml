apiVersion: v1
kind: ConfigMap
metadata:
  name: locustfile
  namespace: online-boutique
data:
  locustfile.py: |
    import random
    from locust import FastHttpUser, TaskSet, between
    import datetime

    products = [
        '0PUK6V6EV0', '1YMWWN1N4O', '2ZYFJ3GM2N', '66VCHSJNUP',
        '6E92ZMYYFZ', '9SIQT8TOJO', 'L9ECAV7KIM', 'LS4PSXUNUM', 'OLJCESPC7Z']

    _names = ['alice','bob','carol','dave','eve','frank','grace','hal']
    _domains = ['example.com','test.org','demo.net']
    _streets = ['Main St','Oak Ave','Maple Dr','Pine Rd','Cedar Ln']
    _cities = ['Springfield','Shelbyville','Ogdenville','North Haverbrook']
    _states = ['CA','NY','TX','FL','WA','OR','IL','PA']
    _countries = ['US','CA','GB','AU','DE','FR']
    _visa_test_cards = [
        '4111111111111111', '4242424242424242', '4000056655665556',
        '4012888888881881', '4222222222222', '4000058260000005',
    ]

    def _fake_email():
        return f"{random.choice(_names)}{random.randint(1,999)}@{random.choice(_domains)}"

    def _fake_street():
        return f"{random.randint(100,9999)} {random.choice(_streets)}"

    def _fake_zip():
        return f"{random.randint(10000,99999)}"

    def _fake_city():
        return random.choice(_cities)

    def _fake_state():
        return random.choice(_states)

    def _fake_country():
        return random.choice(_countries)

    def _fake_cc():
        return random.choice(_visa_test_cards)

    def index(l):
        l.client.get("/")

    def setCurrency(l):
        currencies = ['EUR', 'USD', 'JPY', 'CAD', 'GBP', 'TRY']
        l.client.post("/setCurrency", {'currency_code': random.choice(currencies)})

    def browseProduct(l):
        l.client.get("/product/" + random.choice(products))

    def viewCart(l):
        l.client.get("/cart")

    def addToCart(l):
        product = random.choice(products)
        l.client.get("/product/" + product)
        l.client.post("/cart", {'product_id': product, 'quantity': random.randint(1, 10)})

    def empty_cart(l):
        l.client.post('/cart/empty')

    def checkout(l):
        addToCart(l)
        current_year = datetime.datetime.now().year + 1
        l.client.post("/cart/checkout", {
            'email': _fake_email(),
            'street_address': _fake_street(),
            'zip_code': _fake_zip(),
            'city': _fake_city(),
            'state': _fake_state(),
            'country': _fake_country(),
            'credit_card_number': _fake_cc(),
            'credit_card_expiration_month': random.randint(1, 12),
            'credit_card_expiration_year': random.randint(current_year, current_year + 10),
            'credit_card_cvv': f"{random.randint(100, 999)}",
        })

    def logout(l):
        l.client.get('/logout')

    class UserBehavior(TaskSet):
        def on_start(self):
            index(self)
        tasks = {index: 1, setCurrency: 2, browseProduct: 10, addToCart: 2, viewCart: 3, checkout: 1}

    class WebsiteUser(FastHttpUser):
        tasks = [UserBehavior]
        wait_time = between(1, 10)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: loadgenerator
  name: loadgenerator
  namespace: online-boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgenerator
  template:
    metadata:
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: 'true'
      labels:
        app: loadgenerator
    spec:
      containers:
      - name: main
        image: locustio/locust:2.43.4
        command:
        - locust
        - --host=http://frontend:80
        - -f=/config/locustfile.py
        - --headless
        - --users=10
        - --spawn-rate=1
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: locustfile
          mountPath: /config
      initContainers:
      - command:
        - /bin/sh
        - -exc
        - |
          RETRY_INTERVAL=10
          while true; do
            echo "Pinging frontend: ${FRONTEND_ADDR}..."
            STATUSCODE=$(wget --server-response http://${FRONTEND_ADDR} 2>&1 | awk '/^  HTTP/{print $2}')
            if [ "$STATUSCODE" = "200" ]; then
              echo "Frontend is reachable."
              exit 0
            fi
            echo "Waiting for frontend (status: ${STATUSCODE:-none})..."
            sleep $RETRY_INTERVAL
          done
        env:
        - name: FRONTEND_ADDR
          value: frontend:80
        image: busybox:latest
        name: frontend-check
      restartPolicy: Always
      serviceAccountName: loadgenerator
      terminationGracePeriodSeconds: 5
      volumes:
      - name: locustfile
        configMap:
          name: locustfile
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loadgenerator
  namespace: online-boutique
